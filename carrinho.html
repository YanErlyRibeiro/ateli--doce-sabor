<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | Ateliê Doce Sabor</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--cor-fundo-claro);">

    <header>
        <div class="logo"><h1 class="logo-text">Ateliê Doce Sabor</h1></div>
        <nav>
            <ul><li><a href="index.html">← Voltar ao Cardápio</a></li></ul>
        </nav>
    </header>

    <main style="padding: 50px 10%; max-width: 800px; margin: 0 auto; min-height: 60vh;">
        <h2 style="font-size: 2.5rem; margin-bottom: 30px;">Seu Pedido</h2>
        
        <!-- Onde os itens vão aparecer -->
        <div id="lista-carrinho" style="background: white; padding: 20px; border-radius: 15px; box-shadow: var(--sombra-card); margin-bottom: 30px;">
            <!-- O JS vai injetar o HTML aqui -->
        </div>

        <div style="text-align: right; margin-bottom: 30px;">
            <h3 style="font-size: 1.8rem;">Total: <span id="valor-total" style="color: var(--cor-principal);">R$ 0,00</span></h3>
        </div>

        <button id="btn-whatsapp" class="btn-principal" style="width: 100%; font-size: 1.2rem; padding: 20px; background-color: #25D366;">
            Enviar Pedido pelo WhatsApp
        </button>
    </main>

    <footer style="padding: 40px;">
        <p>📍 Manaus - AM</p>
        <p>&copy; 2026 Ateliê Doce Sabor.</p>
    </footer>

    <!-- Script exclusivo do carrinho -->
    <script src="carrinho.js"></script>
</body>
</html>
